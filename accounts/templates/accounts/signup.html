<!DOCTYPE html>
<html>
<head><title>Sign up — Spell</title></head>
<body>
    <h1>Sign up for Spell</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
    <p>Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
</body>
</html>
